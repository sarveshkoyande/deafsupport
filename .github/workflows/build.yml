name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

permissions:
  contents: write        # needed to publish the APK to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK for easy download
        run: cp app/build/outputs/apk/debug/app-debug.apk EchoSense-debug.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EchoSense-debug-apk
          path: EchoSense-debug.apk

      - name: Publish APK to the "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest EchoSense build
          prerelease: true
          files: EchoSense-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
